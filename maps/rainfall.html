

<!DOCTYPE html>
<html land="en".
    <head>
        <title>US Annual Rainfall</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        
        <!-- OpenLayers CSS -->
        <link rel="stylesheet" href="http://openlayers.org/en/v3.0.0/css/ol.css" type="text/css">    
        
        <!-- insert app styles here -->
        <style>
        .ol-zoom {
            font-family: Georgia, serif;
            color: black !important;
            background-color: white;
        }
        
        .ol-zoom-in, .ol-zoom-out {
            color: black !important;
            background-color: #709FC9 !important;      
        }
        
        .ol-attribution {
            color: red !important;
            background-color: white !important;
            font-color: red;
            
        }
        
        .att {
            color: red !important;
            background-color: white !important;
            font-color: red;    
        }
        
        .ol-attribution ul {
            color: black !important;
            /*display: block !important;*/
        }
              
        .ol-attribution ul li {
            display: list-item !important;          
        }
        
        
        .ol-mouse-position {
            background-color: #709FC9;
            padding: 4px 8px 4px 8px;
            border: 2px solid white;
            font-family: "Lucida Console", Monaco, monospace;
            font-size: small;
            border-radius: 4px;
        }
        
        .map {
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            height: 450px;
            box-shadow: 5px 5px 5px #888;
            border-right: 2px solid black;
            border-left: 2px solid black;
        }
            
        html, body {
        
            font-family: Georgia, serif;
        }
        
        a:link {
            color: #364DC9
        }
        
        a:visited {
            color: #551A8B
        }
        
        p {
            padding: 0 20px 0 20px
        }
        
        div#content {
            margin-left: auto;
            margin-right: auto;
            width: 1100px;
        }
        
        h1 {
            vertical-align: text-top;
            text-align: center;
        }
        
        #rowhead {
            border-right: 2px solid black;
            padding-top: 5px;
            width: 95px;
            outline: 0;
            position: relative;
            height: 20px;
            background-color: #709FC9;
            text-align: center;
            font-family: Georgia, serif;
            font-size: small;
        }

        button {
            border: 0;
            padding: 0;
            outline: 0;
            position: relative;
            height: 25px;
            text-align: center;
            font-family: Georgia, serif;
            font-size: small;
        }
        
        button.lite {
            background-color: transparent;
            font-size: medium;
        }
        
        button:hover {
            background-color: #AB1722;
        }
        
        button.lite:hover {
            color: #AB1722 !important;
            background-color: transparent;
        }

        button.selected {
            background-color: #83A854;
        }
        
        button.layer {
            width: 160px;
        }
        
        button.zoom {
            width: 50px
        }    

        #titlebar {
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            height: 50px;
            box-shadow: 5px 5px 5px #888;
            background-color: #aaa;
            border: 2px solid black;
        }
        
        #footbar {
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            box-shadow: 5px 5px 5px #888;
            background-color: #aaa;
            border: 2px solid black;
        }
        
        ul.bar li {
            display: inline-block;
            float: left;
            height: 25px;
        }
        
        ul.bar li.last {
            border-right: 2px solid black
        }
        
        ul.bar {
            padding: 0;
            margin: 0;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
            height: 25px;
            box-shadow: 5px 5px 5px #888;
            background-color: #aaa;
            border-right: 2px solid black;
            border-left: 2px solid black;
            border-bottom: 2px solid black;
            text-align: center;
        }
        
        #slider-id {
            width: 492px;
            margin: 10px;
        }
        
        #legend {
            position: absolute;
            display: block;
            margin-top: -292px;
            margin-left: 2px;
        }

        </style>
    </head>
    <body>
    
        <!-- insert app html tags here -->
        <div id="content">
            <!-- <div id="titlebar">
                <h1>natchitoches parish, la</h1>               
            </div>
            -->
            <div id="navbar" >
                <ul id="bmlist", class="bar", style="border-top: 2px solid black">
                    <li id="rowhead"><b>BASEMAP</b></li>
                    <li><button id="osm" class="layer" class="selected">open street map</button></li>
                    <li class="last"><button id="imagery" class="layer">aerial imagery</button></li>
                </ul>
            </div>

            <div id="navbar">
                <ul id="overlist" class="bar">
                    <li id="rowhead"><b>OVERLAY</b></li>
                    <li><button id="rainfall" class="layer" class="selected">avg rainfall 2005-2009</button></li>
                    <li class="last"><button id="none" class="layer" style="width:75px"><em>none</em></button></li>
                </ul>
            </div>
            
            
            <div id="map" class="map">
                
            </div>
            
            <div id="legend" style="display:none">
                <img src="http://www.adamcfcox.com/images/rainfall_legend.png"></img>
            </div>
            
            <div id="footbar">
			<!--
                <p style="text-align:left"><b>what am I looking at?</b> <button id="showinfo" class="lite">show</button> | <button id="hideinfo" class="lite">hide</button>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
			-->
                <!-- legend -->
                
                
                <p style="text-align:left"><b style="color:#AB1722">Rainfall Legend</b> <button id="showacc" class="lite">show</button> | <button id="hideacc" class="lite">hide</button></p>

                

			</div>
        </div>

        <!-- OpenLayers JS -->
        <script src="http://openlayers.org/en/v3.0.0/build/ol.js" type="text/javascript"></script>
        
        <!-- JQuery JS -->
        <script src="http://code.jquery.com/jquery-latest.js"></script>

        <!-- actual map code -->
        <script>
        
        var rainfall = new ol.layer.Tile({
            name: 'rainfall',
            opacity: .6,
            source: new ol.source.TileWMS({
                url: 'http://webservices.nationalatlas.gov/wms?SERVICE=WMS&REQUEST=GetMap&VERSION=1.1.1&FORMAT=PNG&WIDTH=300&HEIGHT=425&SRS=EPSG:4326&BBOX=-125,31,-110,50&LAYERS=pr0509',
                
                //url: 'http://webservices.nationalatlas.gov/wms/climate?SERVICE=WMS&REQUEST=GetCapabilities',
                params: {
                    //'LAYERS': 'pr0509',
                    //'TILED': true,
                    //'singleTile':true,
                    //'ratio':5
                }, 
            })
        });
        
        arrayOSM = ["http://otile1.mqcdn.com/tiles/1.0.0/map/{z}/{x}/{y}.jpg",
                    "http://otile2.mqcdn.com/tiles/1.0.0/map/{z}/{x}/{y}.jpg",
                    "http://otile3.mqcdn.com/tiles/1.0.0/map/{z}/{x}/{y}.jpg",
                    "http://otile4.mqcdn.com/tiles/1.0.0/map/{z}/{x}/{y}.jpg"];
               
        var osm = new ol.layer.Tile({
            name: 'osm',
            preload: Infinity,
            source: new ol.source.MapQuest({
                layer: 'osm',           
            })
        });
        
        var imagery = new ol.layer.Tile({
            name: 'imagery',
            preload: Infinity,
            source: new ol.source.MapQuest({
                layer: 'sat'
            })
        });
        
        var blank = new ol.layer.Tile({
            source: new ol.source.TileWMS({
                url: '',
            })
        });
        
        var collection = new ol.Collection([osm,blank]);
        $('#osm').addClass('selected');
        $('#none').addClass('selected');
        
        var noteid_arr = ["p#osmnote","p#roadmapnote"];
        var info_shown = false
        
        var controls = [
            new ol.control.MousePosition({
                undefinedHTML: '<b>n/a</b>',
                projection: 'EPSG:4326',
                coordinateFormat: function(coordinate) {
                    return ol.coordinate.format(coordinate, '<b>{x}, {y}</b>', 3)
                }
            }),
            new ol.control.Zoom({
                zoomInTipLabel: 'zoom in',
                zoomOutTipLabel: 'zoom out'
            }),
            new ol.control.Attribution({
                tipLabel: 'layer attributions',
            })
        ];
        
        var map = new ol.Map({
            target: 'map',
            renderer: 'canvas',
            layers: collection,
            controls: controls,
            view: new ol.View({
                center: ol.proj.transform([-112., 33.4], 'EPSG:4326', 'EPSG:3857'),
                minZoom: 1,
                maxZoom: 18,
                zoom: 8,
            }),
            minZoomLevel: 7,
        });
        
        function selectBasemap() {
            $('ul.bar#bmlist button.layer').on('click', function() {
                $('ul.bar#bmlist button').removeClass('selected');
                $(this).addClass('selected');
            });
        };
        
        function selectOverlay() {
            $('ul.bar#overlist button.layer').on('click', function() {
                $('ul.bar#overlist button').removeClass('selected');
                $(this).addClass('selected');
            });
        };
        
        function showInfo() {
            $("#showinfo").click(function(){
                console.log(noteid_arr);
                $(noteid_arr.join([separator = ','])).show();
                info_shown = true;
            });
        };
            
        function hideInfo() {
            $("#hideinfo").click(function(){
                console.log(noteid_arr);
                $(noteid_arr.join([separator = ','])).hide();
                info_shown = false;
            });
        };

        
        
        $(document).ready(function() {
        
            $("#hideacc").click(function(){
                $("div#legend").hide();
            });
            $("#showacc").click(function(){
                $("div#legend").show();
            });
            
            selectBasemap();
            selectOverlay();
            
            showInfo();
            hideInfo();
            
            $('#imagery').on('click', function() {
                collection.setAt(0, imagery);
                map.setLayerGroup = new ol.layer.Group(collection);
                
                $(noteid_arr.join([separator = ','])).hide();
                noteid_arr[0] = "p#imagerynote";
                if (info_shown == true) {
                    $(noteid_arr.join([separator = ','])).show();
                };
            });
            
            
            $('#osm').on('click', function() {
                collection.setAt(0, osm);
                map.setLayerGroup = new ol.layer.Group(collection);
                
                $(noteid_arr.join([separator = ','])).hide();
                noteid_arr[0] = "p#osmnote";
                if (info_shown == true) {
                    $(noteid_arr.join([separator = ','])).show();
                };
            });
            
            
            $('#rainfall').on('click', function() {
                collection.setAt(1, rainfall);
                map.setLayerGroup = new ol.layer.Group(collection);
                
                $(noteid_arr.join([separator = ','])).hide();
                noteid_arr[1] = "p#roadmapnote";
                if (info_shown == true) {
                    $(noteid_arr.join([separator = ','])).show();
                };
            });
            
            $('#none').on('click', function() {
                collection.setAt(1, blank)
                map.setLayerGroup = new ol.layer.Group(collection);
                
                $(noteid_arr.join([separator = ','])).hide();
                noteid_arr[1] = "_";
                if (info_shown == true) {
                    $(noteid_arr.join([separator = ','])).show();
                };
            });
        }); 
        
        </script>        
    </body>
</html>
