<html>
<head>
  <title>OpenLayers Example</title>
    <script src="http://openlayers.org/api/OpenLayers.js"></script>
    <style type="text/css"> .olTileImage.olImageLoadError {
    display: none !important;
}
    </style>
    </head>
    <body>
      <div style="width:100%; height:100%" id="map"></div>
      <script defer="defer" type="text/javascript">

        bounds = new OpenLayers.Bounds();
        bounds.extend(new OpenLayers.LonLat(457982.5,3556987.5));
        bounds.extend(new OpenLayers.LonLat(526997.5,3468027.5));
//bounds.toBBOX(); // returns 4,5,5,6
      var bbox = bounds.toBBOX();
      var options = {
            projection: new OpenLayers.Projection("EPSG:900913"),
            units: "m",
            maxResolution: 156543.0339,
            minScale: 433000,
            
            displayProjection:  new OpenLayers.Projection("EPSG:4326")
            //maxExtent: bbox
            //maxExtent: new OpenLayers.Bounds(-457982.5, 3468027.5,
            //                        -526997.5, 3556987.5)
            }
        var map = new OpenLayers.Map('map',options);
        var wms = new OpenLayers.Layer.WMS( "OSM",
            "http://vmap0.tiles.osgeo.org/wms/vmap0", {
            layers: 'basic'
            },
            {isBaseLayer: true}
            );
        var relief = new OpenLayers.Layer.WMS( "relief map",
            "http://54.148.201.140:8080/geoserver/raster/wms/", {
            layers: 'raster:multi_color_relief',
            format: 'image/png',
            srs: 'EPSG:900913',
            transparent: true
            
            },
            //{singleTile: true, ratio: 1}
            {isBaseLayer: false}
            );
        var drg = new OpenLayers.Layer.WMS( "drg uncorrected",
            "http://54.148.201.140:8080/geoserver/raster/wms/", {
            layers: 'raster:drg_uncorrected',
            format: 'image/png',
            srs: 'EPSG:900913',
            transparent: true            
            },
            {isBaseLayer: false}
            );  
        var drg_clip = new OpenLayers.Layer.WMS( "drg clip",
            "http://54.148.201.140:8080/geoserver/raster/wms/", {
            layers: 'raster:sm_clip2',
            format: 'image/png',
            srs: 'EPSG:900913',
            transparent: true            
            },
            {isBaseLayer: false}
            ); 
        var drg_cor = new OpenLayers.Layer.XYZ( "drg from tiles",
                    "http://54.148.201.140/tiles/drg_COR/${z}/${x}/${y}.png",
                    {sphericalMercator: true,
                    isBaseLayer: false}
                    
                    )
  
        arrayOSM = ["http://otile1.mqcdn.com/tiles/1.0.0/map/${z}/${x}/${y}.jpg",
                    "http://otile2.mqcdn.com/tiles/1.0.0/map/${z}/${x}/${y}.jpg",
                    "http://otile3.mqcdn.com/tiles/1.0.0/map/${z}/${x}/${y}.jpg",
                    "http://otile4.mqcdn.com/tiles/1.0.0/map/${z}/${x}/${y}.jpg"];
        var osm = new OpenLayers.Layer.OSM("open street map", arrayOSM);
        
        
        map.addLayer(osm);
        map.addLayer(relief);
        map.addLayer(drg);
        map.addLayer(drg_cor);
        map.addLayer(drg_clip);
        
        
        //map.addLayer(wms);
        
        console.log("print here");
        
        // build up all controls
         map.addControl(new OpenLayers.Control.PanZoomBar({
                 position: new OpenLayers.Pixel(2, 15)
         }));
         map.addControl(new OpenLayers.Control.Navigation());
         map.addControl(new OpenLayers.Control.LayerSwitcher());
         map.addControl(new OpenLayers.Control.Scale());
         map.addControl(new OpenLayers.Control.MousePosition());
         //map.zoomToExtent(bbox);
         map.setCenter([-10358974, 3706313],12)        

      </script>

</body>
</html>
